<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BillForge Admin</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .admin-shell { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
      .admin-login { max-width: 400px; margin: 80px auto; }
      .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
      .stat-card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 18px; box-shadow: var(--shadow); }
      .stat-card span { display: block; color: var(--muted); font-size: 0.78rem; font-weight: 900; text-transform: uppercase; margin-bottom: 6px; }
      .stat-card strong { font-size: 2rem; }
      .admin-table-wrap { background: #fff; border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 28px; }
      .admin-table-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--line); }
      .admin-table-head h2 { margin: 0; font-size: 1.1rem; }
      .search-input { border: 1px solid var(--line); border-radius: 7px; padding: 8px 12px; font-size: 0.9rem; width: 220px; }
      table { width: 100%; border-collapse: collapse; }
      th { background: var(--navy); color: #fff; font-size: 0.82rem; padding: 11px 14px; text-align: left; }
      td { padding: 11px 14px; border-bottom: 1px solid var(--line); font-size: 0.9rem; }
      tr:last-child td { border-bottom: 0; }
      tr:hover td { background: var(--panel); }
      .badge { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; }
      .badge-starter { background: var(--panel); color: var(--muted); }
      .badge-basic { background: #dbeafe; color: #1e40af; }
      .badge-growth { background: var(--soft-green); color: var(--accent-dark); }
      .badge-pro { background: #fef3c7; color: #92400e; }
      .badge-success { background: var(--soft-green); color: var(--accent-dark); }
      .badge-failed { background: #fff1f2; color: var(--rose); }
      .badge-created { background: var(--soft-amber); color: var(--amber); }
      .tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
      .tab-btn { border: 1px solid var(--line); background: #fff; color: var(--muted); padding: 0 18px; min-height: 38px; border-radius: 7px; font-weight: 850; cursor: pointer; }
      .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .empty-state { text-align: center; padding: 40px; color: var(--muted); }
      .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
      .admin-header h1 { margin: 0; font-size: 1.6rem; }
      .loading { text-align: center; padding: 30px; color: var(--muted); }
      @media (max-width: 700px) {
        .stat-grid { grid-template-columns: repeat(2, 1fr); }
        .search-input { width: 140px; }
      }
    </style>
  </head>
  <body>
    <div id="adminLoginPage" class="admin-shell">
      <div class="admin-login auth-panel">
        <p class="eyebrow">Admin access</p>
        <h1 style="font-size:1.8rem">BillForge Admin</h1>
        <p style="color:var(--muted)">Login with your admin Supabase account.</p>
        <div class="auth-form">
          <label>Email <input id="adminEmail" type="email" placeholder="admin@example.com" /></label>
          <label>Password <input id="adminPassword" type="password" placeholder="••••••••" /></label>
          <button class="primary-btn" onclick="adminLogin()" type="button">Login to Admin</button>
        </div>
        <p id="adminLoginMsg" style="color:var(--rose);margin-top:12px;font-weight:800"></p>
      </div>
    </div>

    <div id="adminDashboard" class="admin-shell hidden">
      <div class="admin-header">
        <div>
          <p class="eyebrow">Admin Panel</p>
          <h1>BillForge Dashboard</h1>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <span class="account-pill" id="adminEmailDisplay"></span>
          <button class="ghost-btn" onclick="adminLogout()" type="button">Logout</button>
        </div>
      </div>

      <div class="stat-grid" id="statGrid">
        <div class="stat-card"><span>Total Users</span><strong id="statUsers">—</strong></div>
        <div class="stat-card"><span>Paid Users</span><strong id="statPaid">—</strong></div>
        <div class="stat-card"><span>Total Revenue</span><strong id="statRevenue">—</strong></div>
        <div class="stat-card"><span>Total Payments</span><strong id="statPayments">—</strong></div>
      </div>

      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('users')" type="button">Users</button>
        <button class="tab-btn" onclick="switchTab('payments')" type="button">Payments</button>
      </div>

      <div id="usersTab">
        <div class="admin-table-wrap">
          <div class="admin-table-head">
            <h2>All Users</h2>
            <input class="search-input" id="userSearch" type="text" placeholder="Search email..." oninput="filterUsers()" />
          </div>
          <div id="usersTableBody"><div class="loading">Loading users...</div></div>
        </div>
      </div>

      <div id="paymentsTab" class="hidden">
        <div class="admin-table-wrap">
          <div class="admin-table-head">
            <h2>All Payments</h2>
            <input class="search-input" id="paymentSearch" type="text" placeholder="Search email..." oninput="filterPayments()" />
          </div>
          <div id="paymentsTableBody"><div class="loading">Loading payments...</div></div>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://fhujjvzvxuoavvrfagig.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZodWpqdnp2eHVvYXZ2cmZhZ2lnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTM2MTksImV4cCI6MjA5NTg2OTYxOX0.bkTCR0b5Jr2nCjyKZJBLHuqsWOPvQ2vY2RoD0JS7KKw";
      const SUPABASE_SERVICE_KEY = "YOUR_SERVICE_ROLE_KEY";

      const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let allUsers = [];
      let allPayments = [];

      // ✅ FIX: Clear all stale Supabase tokens from localStorage
      function clearSupabaseStorage() {
        Object.keys(localStorage).forEach(key => {
          if (key.startsWith('sb-')) localStorage.removeItem(key);
        });
        Object.keys(sessionStorage).forEach(key => {
          if (key.startsWith('sb-')) sessionStorage.removeItem(key);
        });
      }

      async function adminLogin() {
        const email = document.querySelector("#adminEmail").value.trim();
        const password = document.querySelector("#adminPassword").value;
        const msgEl = document.querySelector("#adminLoginMsg");
        msgEl.textContent = "";

        // ✅ FIX: Sign out and clear storage before every login attempt
        await client.auth.signOut();
        clearSupabaseStorage();

        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) {
          msgEl.textContent = error.message;
          return;
        }
        document.querySelector("#adminEmailDisplay").textContent = data.user.email;
        document.querySelector("#adminLoginPage").classList.add("hidden");
        document.querySelector("#adminDashboard").classList.remove("hidden");
        loadData();
      }

      async function adminLogout() {
        // ✅ FIX: Properly sign out AND clear all stored tokens
        await client.auth.signOut();
        clearSupabaseStorage();

        document.querySelector("#adminLoginPage").classList.remove("hidden");
        document.querySelector("#adminDashboard").classList.add("hidden");

        // Clear input fields
        document.querySelector("#adminEmail").value = "";
        document.querySelector("#adminPassword").value = "";
        document.querySelector("#adminLoginMsg").textContent = "";
      }

      async function loadData() {
        const { data: profiles } = await client.from("profiles").select("*").order("updated_at", { ascending: false });
        const { data: payments } = await client.from("payments").select("*").order("created_at", { ascending: false });

        allUsers = profiles || [];
        allPayments = payments || [];

        updateStats();
        renderUsers(allUsers);
        renderPayments(allPayments);
      }

      function updateStats() {
        const paid = allUsers.filter(u => u.plan_id !== "starter").length;
        const revenue = allPayments.filter(p => p.status === "captured" || p.razorpay_payment_id).reduce((sum, p) => sum + (p.amount || 0), 0);
        document.querySelector("#statUsers").textContent = allUsers.length;
        document.querySelector("#statPaid").textContent = paid;
        document.querySelector("#statRevenue").textContent = "₹" + (revenue / 100).toLocaleString("en-IN");
        document.querySelector("#statPayments").textContent = allPayments.length;
      }

      function planBadge(plan) {
        return `<span class="badge badge-${plan || 'starter'}">${plan || 'starter'}</span>`;
      }

      function statusBadge(status) {
        return `<span class="badge badge-${status || 'created'}">${status || 'created'}</span>`;
      }

      function renderUsers(users) {
        const el = document.querySelector("#usersTableBody");
        if (!users.length) { el.innerHTML = '<div class="empty-state">No users found.</div>'; return; }
        el.innerHTML = `<table>
          <thead><tr><th>Email</th><th>Plan</th><th>PDFs Used</th><th>Last Updated</th></tr></thead>
          <tbody>${users.map(u => `
            <tr>
              <td>${u.email || "—"}</td>
              <td>${planBadge(u.plan_id)}</td>
              <td>${u.pdf_used || 0}</td>
              <td>${u.updated_at ? new Date(u.updated_at).toLocaleDateString("en-IN") : "—"}</td>
            </tr>`).join("")}
          </tbody>
        </table>`;
      }

      function renderPayments(payments) {
        const el = document.querySelector("#paymentsTableBody");
        if (!payments.length) { el.innerHTML = '<div class="empty-state">No payments found.</div>'; return; }
        el.innerHTML = `<table>
          <thead><tr><th>Email</th><th>Plan</th><th>Amount</th><th>Status</th><th>Payment ID</th><th>Date</th></tr></thead>
          <tbody>${payments.map(p => `
            <tr>
              <td>${p.email || "—"}</td>
              <td>${planBadge(p.plan_id)}</td>
              <td>₹${((p.amount || 0) / 100).toLocaleString("en-IN")}</td>
              <td>${statusBadge(p.status)}</td>
              <td style="font-size:0.78rem;color:var(--muted)">${p.razorpay_payment_id || "—"}</td>
              <td>${p.created_at ? new Date(p.created_at).toLocaleDateString("en-IN") : "—"}</td>
            </tr>`).join("")}
          </tbody>
        </table>`;
      }

      function filterUsers() {
        const q = document.querySelector("#userSearch").value.toLowerCase();
        renderUsers(allUsers.filter(u => (u.email || "").toLowerCase().includes(q)));
      }

      function filterPayments() {
        const q = document.querySelector("#paymentSearch").value.toLowerCase();
        renderPayments(allPayments.filter(p => (p.email || "").toLowerCase().includes(p)));
      }

      function switchTab(tab) {
        document.querySelector("#usersTab").classList.toggle("hidden", tab !== "users");
        document.querySelector("#paymentsTab").classList.toggle("hidden", tab !== "payments");
        document.querySelectorAll(".tab-btn").forEach((btn, i) => {
          btn.classList.toggle("active", (i === 0 && tab === "users") || (i === 1 && tab === "payments"));
        });
      }

      // Auto-login if valid session exists
      client.auth.getUser().then(({ data }) => {
        if (data.user) {
          document.querySelector("#adminEmailDisplay").textContent = data.user.email;
          document.querySelector("#adminLoginPage").classList.add("hidden");
          document.querySelector("#adminDashboard").classList.remove("hidden");
          loadData();
        }
      });
    </script>
  </body>
</html>
