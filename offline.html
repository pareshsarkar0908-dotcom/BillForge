<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>BillForge Offline</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.json" />
    <style>
      :root {
        color-scheme: light;
        --ink: #17212b;
        --muted: #667485;
        --line: #d9e0e7;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #edf1f5;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(23, 33, 43, 0.11);
        padding: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 22px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        font-weight: 950;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.8rem;
        line-height: 1.1;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        font-weight: 850;
        padding: 0 18px;
        text-decoration: none;
      }

      a:hover {
        background: var(--accent-dark);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #10151b;
          color: #e8eef5;
        }

        main {
          background: #18212a;
          border-color: #33414d;
          box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
        }

        p {
          color: #a9b5c2;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand" aria-label="BillForge">
        <span class="brand-mark">B</span>
        <strong>BillForge</strong>
      </div>
      <h1>You are offline</h1>
      <p>BillForge will reopen from the cached app when your browser has the saved files available. Connect to the internet for login, payments, and cloud sync.</p>
      <a href="/">Open BillForge</a>
    </main>
  </body>
</html>
